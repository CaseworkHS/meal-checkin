<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthServe — Staff Meal Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f5f5f3;padding:16px;}
.header{background:#8C0303;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.header h1{color:#fff;font-size:16px;}
.header .date{color:rgba(255,255,255,0.8);font-size:12px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat{background:#fff;border-radius:10px;padding:14px;text-align:center;border:0.5px solid #eee;}
.stat .num{font-size:28px;font-weight:700;}
.stat .lbl{font-size:11px;color:#888;margin-top:3px;}
.stat.green .num{color:#085041;}
.stat.amber .num{color:#854F0B;}
.stat.red .num{color:#8C0303;}
.controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.btn{font-size:12px;padding:8px 14px;border:1px solid #ddd;border-radius:8px;cursor:pointer;background:#fff;font-weight:500;}
.btn.primary{background:#8C0303;color:#fff;border-color:#8C0303;}
.btn.green{background:#085041;color:#fff;border-color:#085041;}
.table-wrap{background:#fff;border-radius:10px;overflow:hidden;border:0.5px solid #eee;}
.table-header{background:#8C0303;color:#fff;display:grid;grid-template-columns:36px 1fr 80px 95px 80px;padding:8px 12px;font-size:11px;font-weight:600;gap:4px;}
.table-row{display:grid;grid-template-columns:36px 1fr 80px 95px 80px;padding:8px 12px;font-size:12px;border-bottom:0.5px solid #f0f0f0;align-items:center;gap:4px;}
.table-row:nth-child(even){background:#fafafa;}
.table-row:last-child{border-bottom:none;}
.fin-badge{background:#F4E3DC;color:#8C0303;font-weight:700;padding:2px 7px;border-radius:5px;font-size:11px;display:inline-block;}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px;}
.refresh-time{font-size:11px;color:#aaa;text-align:right;margin-bottom:8px;}
.cap-bar-wrap{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;border:0.5px solid #eee;}
.cap-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;}
.cap-label span:first-child{font-weight:600;color:#333;}
.cap-label span:last-child{font-weight:700;}
.cap-bar{height:12px;background:#f0f0f0;border-radius:6px;overflow:hidden;}
.cap-fill{height:100%;border-radius:6px;transition:width 0.3s;}
</style>
</head>
<body>
<div class="header">
  <h1>HealthServe CWSS &mdash; Meal Dashboard</h1>
  <div class="date" id="header-date"></div>
</div>

<div class="stats">
  <div class="stat green"><div class="num" id="stat-today">0</div><div class="lbl">Meals today</div></div>
  <div class="stat amber"><div class="num" id="stat-remaining">30</div><div class="lbl">Remaining cap</div></div>
  <div class="stat red"><div class="num" id="stat-time">--:--</div><div class="lbl">SG time now</div></div>
</div>

<div class="cap-bar-wrap">
  <div class="cap-label">
    <span>Daily cap usage</span>
    <span id="cap-label-right" style="color:#8C0303;">0 / 30 meals</span>
  </div>
  <div class="cap-bar"><div class="cap-fill" id="cap-fill" style="width:0%;background:#085041;"></div></div>
</div>

<div class="controls">
  <button class="btn primary" onclick="loadData()">&#8635; Refresh</button>
  <button class="btn" onclick="setToday()">Today</button>
  <input type="date" id="date-filter" style="font-size:12px;padding:7px;border:1px solid #ddd;border-radius:8px;" onchange="loadFiltered()">
  <button class="btn green" onclick="exportCSV()">Export CSV</button>
</div>

<div class="refresh-time" id="refresh-time"></div>

<div class="table-wrap">
  <div class="table-header">
    <div>#</div>
    <div>Worker name</div>
    <div>FIN last 4</div>
    <div>Date</div>
    <div>Time (SG)</div>
  </div>
  <div id="table-body"><div class="empty">Loading...</div></div>
</div>

<script>
const SB_URL='https://mstxqyftlshgwmzrrkyr.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdHhxeWZ0bHNoZ3dtenJya3lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODAxMjUsImV4cCI6MjA5Njc1NjEyNX0.6pwUe7fi1xFMuU83oZj7matMBzWiZtJUYl7nS9u6X50';
const DAILY_CAP=30;

function sgNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Singapore'}));}
function sgDate(d){d=d||sgNow();return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}

async function dbGet(path){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(!r.ok)throw new Error('DB '+r.status);
  return r.json();
}

let allData=[];

async function loadData(){
  const today=sgDate();
  document.getElementById('date-filter').value=today;
  document.getElementById('refresh-time').textContent='Last refreshed: '+sgNow().toTimeString().slice(0,8);
  try{
    const data=await dbGet('meal_checkins?select=*&checkin_date=eq.'+today+'&order=checkin_time.asc');
    allData=Array.isArray(data)?data:[];
    updateStats(allData);
    renderTable(allData);
  }catch(e){
    document.getElementById('table-body').innerHTML='<div class="empty">Connection error: '+e.message+'</div>';
  }
}

async function loadFiltered(){
  const d=document.getElementById('date-filter').value;
  if(!d)return;
  try{
    const data=await dbGet('meal_checkins?select=*&checkin_date=eq.'+d+'&order=checkin_time.asc');
    allData=Array.isArray(data)?data:[];
    updateStats(allData);
    renderTable(allData);
  }catch(e){}
}

function setToday(){
  document.getElementById('date-filter').value=sgDate();
  loadFiltered();
}

function updateStats(data){
  const n=data.length;
  const rem=Math.max(0,DAILY_CAP-n);
  const pct=Math.min(100,(n/DAILY_CAP)*100);
  document.getElementById('stat-today').textContent=n;
  document.getElementById('stat-remaining').textContent=rem;
  document.getElementById('cap-label-right').textContent=n+' / '+DAILY_CAP+' meals';
  const fill=document.getElementById('cap-fill');
  fill.style.width=pct+'%';
  fill.style.background=pct>=90?'#8C0303':pct>=60?'#ECC11C':'#085041';
}

function renderTable(data){
  if(!data.length){
    document.getElementById('table-body').innerHTML='<div class="empty">No meals recorded for this date</div>';
    return;
  }
  document.getElementById('table-body').innerHTML=data.map((r,i)=>`
    <div class="table-row">
      <div style="color:#aaa;font-size:11px;">${i+1}</div>
      <div style="font-weight:500;color:#1a1a1a;">${r.worker_name||'--'}</div>
      <div><span class="fin-badge">${r.fin_last4}</span></div>
      <div style="color:#666;font-size:11px;">${r.checkin_date}</div>
      <div style="color:#666;font-size:11px;">${r.checkin_time||'--'}</div>
    </div>`).join('');
}

function exportCSV(){
  if(!allData.length){alert('No data to export');return;}
  const rows=[['#','Worker Name','FIN Last 4','Date','Time (SG)'],...allData.map((r,i)=>[i+1,r.worker_name||'',r.fin_last4,r.checkin_date,r.checkin_time])];
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
  a.download='meals_'+sgDate()+'.csv';
  a.click();
}

setInterval(()=>{document.getElementById('stat-time').textContent=sgNow().toTimeString().slice(0,5);},10000);
document.getElementById('header-date').textContent=sgNow().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
document.getElementById('stat-time').textContent=sgNow().toTimeString().slice(0,5);
document.getElementById('date-filter').value=sgDate();
loadData();
setInterval(loadData,60000);
</script>
</body>
</html>
