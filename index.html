<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HealthServe Meal Check-in</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f5f5f3;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 2px 20px rgba(0,0,0,0.08);}
.hs-header{background:#8C0303;border-radius:12px;padding:16px;margin-bottom:24px;text-align:center;}
.hs-title{color:#fff;font-size:20px;font-weight:700;}
.hs-sub{color:rgba(255,255,255,0.75);font-size:12px;margin-top:4px;}
.hs-badge{background:rgba(255,255,255,0.15);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;display:inline-block;margin-top:6px;}
.form-group{margin-bottom:16px;}
label{font-size:13px;color:#555;display:block;margin-bottom:6px;font-weight:500;}
input{width:100%;font-size:18px;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;text-align:center;letter-spacing:3px;font-weight:700;text-transform:uppercase;}
input:focus{outline:none;border-color:#8C0303;}
.btn{width:100%;font-size:15px;padding:14px;font-weight:700;background:#8C0303;color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:8px;}
.btn:disabled{background:#ccc;cursor:not-allowed;}
.btn:active{transform:scale(0.98);}
.status{display:none;border-radius:12px;padding:20px;text-align:center;margin-top:16px;}
.status.success{background:#E1F5EE;border:2px solid #085041;}
.status.error{background:#FCEBEB;border:2px solid #A32D2D;}
.status.warning{background:#FAEEDA;border:2px solid #854F0B;}
.status-icon{font-size:48px;margin-bottom:8px;}
.status-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.status-msg{font-size:13px;line-height:1.5;}
.status.success .status-title{color:#085041;}
.status.error .status-title{color:#A32D2D;}
.status.warning .status-title{color:#854F0B;}
.info-row{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-top:16px;padding-top:12px;border-top:0.5px solid #eee;}
.time-restrict{background:#FFF8E1;border:1px solid #ECC11C;border-radius:8px;padding:10px 14px;font-size:12px;color:#633806;margin-bottom:16px;text-align:center;}
.loader{display:none;text-align:center;padding:16px;color:#888;font-size:13px;}
.staff-link{text-align:center;margin-top:20px;}
.staff-link a{font-size:11px;color:#aaa;text-decoration:none;}
.bn{font-size:12px;color:#666;margin-top:4px;}
</style>
</head>
<body>
<div class="card">
  <div class="hs-header">
    <div class="hs-title">HealthServe</div>
    <div class="hs-sub">healing, inspiring &amp; bridging communities</div>
    <div class="hs-badge">CWSS Food Programme</div>
  </div>

  <div class="time-restrict" id="time-warning" style="display:none;">
    &#9201; Meal collection is only available<br>
    <strong>12pm &ndash; 5pm, Monday to Friday</strong><br>
    <span class="bn">খাবার সংগ্রহের সময়: দুপুর ১২টা – বিকাল ৫টা</span>
  </div>

  <div id="checkin-form">
    <div class="form-group">
      <label>Enter last 4 characters of your FIN</label>
      <input type="text" id="fin-input" maxlength="4" placeholder="e.g. 662P"
        autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
      <div class="bn" style="text-align:center;margin-top:6px;">আপনার FIN-এর শেষ ৪টি অক্ষর লিখুন</div>
    </div>
    <button class="btn" id="submit-btn" onclick="submitCheckin()">Check in for meal &#10003;</button>
    <div class="info-row">
      <span>Al-Rich Express &middot; 2 Lor 22 Geylang</span>
      <span id="today-date"></span>
    </div>
  </div>

  <div class="loader" id="loader">Checking... please wait</div>

  <div class="status" id="status-box">
    <div class="status-icon" id="status-icon"></div>
    <div class="status-title" id="status-title"></div>
    <div class="status-msg" id="status-msg"></div>
    <button class="btn" id="status-btn" onclick="resetForm()" style="margin-top:16px;display:none;">Check in another person</button>
  </div>
</div>

<div class="staff-link"><a href="staff.html">Staff view &rarr;</a></div>

<script>
const SB_URL = 'https://mstxqyftlshgwmzrrkyr.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdHhxeWZ0bHNoZ3dtenJya3lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODAxMjUsImV4cCI6MjA5Njc1NjEyNX0.6pwUe7fi1xFMuU83oZj7matMBzWiZtJUYl7nS9u6X50';
const MEAL_START = 12;
const MEAL_END = 17;
const DAILY_CAP = 25;

function sgNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Singapore'}));}
function sgDate(){const d=sgNow();return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}
function isWeekday(){const d=sgNow().getDay();return d>=1&&d<=5;}
function inWindow(){const h=sgNow().getHours();return h>=MEAL_START&&h<MEAL_END;}

async function dbGet(path){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}});
  if(!r.ok)throw new Error('DB error '+r.status);
  return r.json();
}
async function dbPost(data){
  const r=await fetch(SB_URL+'/rest/v1/meal_checkins',{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!r.ok)throw new Error('DB error '+r.status);
  return r.json();
}

function showStatus(type,icon,title,msg,showReset){
  document.getElementById('checkin-form').style.display='none';
  document.getElementById('loader').style.display='none';
  const box=document.getElementById('status-box');
  box.className='status '+type;box.style.display='block';
  document.getElementById('status-icon').textContent=icon;
  document.getElementById('status-title').textContent=title;
  document.getElementById('status-msg').innerHTML=msg;
  if(showReset)document.getElementById('status-btn').style.display='block';
}

function resetForm(){
  document.getElementById('fin-input').value='';
  document.getElementById('status-box').style.display='none';
  document.getElementById('status-btn').style.display='none';
  document.getElementById('checkin-form').style.display='block';
  document.getElementById('fin-input').focus();
}

async function submitCheckin(){
  const fin4=document.getElementById('fin-input').value.trim().toUpperCase();
  if(fin4.length!==4){alert('Please enter exactly 4 characters');return;}
  if(!isWeekday()||!inWindow()){
    showStatus('warning','⏰','Not available now',
      'Meal collection is only available<br><strong>Monday to Friday, 12pm – 5pm</strong><br><br>দুপুর ১২টা – বিকাল ৫টা (সোমবার থেকে শুক্রবার)',false);
    return;
  }
  document.getElementById('checkin-form').style.display='none';
  document.getElementById('loader').style.display='block';
  const today=sgDate();
  try{
    const todayAll=await dbGet('meal_checkins?select=id&checkin_date=eq.'+today);
    if(todayAll.length>=DAILY_CAP){
      showStatus('warning','🚫','Daily limit reached',
        'Maximum '+DAILY_CAP+' meals for today reached.<br><br>Contact HealthServe CWSS:<br><strong>+65 6983 6097</strong>',false);
      return;
    }
    const existing=await dbGet('meal_checkins?select=id&fin_last4=eq.'+fin4+'&checkin_date=eq.'+today);
    if(existing.length>0){
      showStatus('error','❌','Already redeemed today',
        'FIN ····'+fin4+' has already collected a meal today.<br><br>আজ এই FIN দিয়ে ইতিমধ্যে খাবার নেওয়া হয়েছে।<br><br><small>Error? Call +65 6983 6097</small>',false);
      return;
    }
    await dbPost({fin_last4:fin4,checkin_date:today,checkin_time:sgNow().toTimeString().slice(0,8),meal_number:todayAll.length+1});
    showStatus('success','✅','Meal approved',
      '<strong>FIN ····'+fin4+'</strong><br>Meal #'+(todayAll.length+1)+' of '+DAILY_CAP+' today<br><br>Show this screen to collect your meal<br><span style="color:#085041;font-size:11px;">এই স্ক্রিন দেখিয়ে খাবার নিন</span><br><br><small style="color:#888;">'+today+' &middot; '+sgNow().toTimeString().slice(0,5)+'</small>',true);
  }catch(e){
    showStatus('error','⚠️','Connection error','Could not connect. Please try again.<br><strong>+65 6983 6097</strong>',true);
  }
}

document.getElementById('today-date').textContent=sgNow().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
document.getElementById('fin-input').addEventListener('keypress',e=>{if(e.key==='Enter')submitCheckin();});
if(!isWeekday()||!inWindow())document.getElementById('time-warning').style.display='block';
</script>
</body>
</html>
